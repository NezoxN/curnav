services:
  db:
    image: postgres:15-alpine
    container_name: ibkt_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ibkt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ibkt_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: development
    container_name: ibkt_backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:secret@db:5432/ibkt_db?schema=public
      DIRECT_URL: postgresql://postgres:secret@db:5432/ibkt_db?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      ANALYTICAL_CORE_URL: http://analytical-core:8000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: ibkt_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/

  analytical-core:
    build:
      context: ./backend/analytical_core
    container_name: ibkt_analytical_core
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      WATCHFILES_FORCE_POLLING: "true"
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync
          path: ./backend/analytical_core
          target: /app

volumes:
  postgres_data:
