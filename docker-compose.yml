services:
  db:
    image: postgres:15-alpine
    container_name: ibkt_postgres_prod
    command: postgres -c max_connections=1000
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 2G
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ibkt_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ibkt_redis_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M

  backend:
    build:
      context: ./backend
      target: production
    container_name: ibkt_backend_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2.5G
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-ibkt_db}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
      UV_THREADPOOL_SIZE: 128
      ANALYTICAL_CORE_URL: http://analytical-core:8000
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-"CurriNav <dev@curnav.local>"}
    depends_on:
      - db
      - redis
      - mailpit

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: ibkt_frontend_prod
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  analytical-core:
    build:
      context: ./backend/analytical_core
    container_name: ibkt_analytical_core_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 4.5G
    expose:
      - "8000"
    environment:
      PORT: 8000
      WEB_CONCURRENCY: 7

  mailpit:
    image: axllent/mailpit:latest
    container_name: ibkt_mailpit_dev
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: ibkt_proxy_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - net.core.somaxconn=4096
      - net.ipv4.ip_local_port_range=1024 65535
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data_prod:
