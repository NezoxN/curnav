# =========================================================================
#             PRODUCTION DOCKER COMPOSE CONFIGURATION (CurriNav)
# =========================================================================
# Запуск: docker compose -f docker-compose.prod.yml up -d --build
# =========================================================================

services:
  # 1. База даних (PostgreSQL) - ПОВНІСТЮ ЗАКРИТА ВІД ЗОВНІШНЬОГО СВІТУ ДЛЯ БЕЗПЕКИ
  db:
    image: postgres:15-alpine
    container_name: ibkt_postgres_prod
    command: postgres -c max_connections=1000
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 2G
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ibkt_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # ПОРТИ НЕ ЕКСПОРТУЮТЬСЯ НА ХОСТ (Безпечний продакшн)

  # 2. Redis - закритий кеш-сервер
  redis:
    image: redis:7-alpine
    container_name: ibkt_redis_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    # ПОРТИ НЕ ЕКСПОРТУЮТЬСЯ НА ХОСТ

  # 3. Бекенд API (Node.js) - закритий, доступ тільки через Nginx
  backend:
    build:
      context: ./backend
      target: production # Висока швидкість (оптимізований білд)
    container_name: ibkt_backend_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2.5G
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-ibkt_db}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
      UV_THREADPOOL_SIZE: 128
      ANALYTICAL_CORE_URL: http://analytical-core:8000
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      
      # SMTP Налаштування для відправки листів
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      - db
      - redis
    # ПОРТИ НЕ ЕКСПОРТУЮТЬСЯ НА ХОСТ

  # 4. Фронтенд (Vite + Nginx Static) - доступний через Nginx proxy
  frontend:
    build:
      context: ./frontend
      target: production # Оптмізовані під продакшн статичні файли
    container_name: ibkt_frontend_prod
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  # 5. Аналітичне ядро (Python / iBKT core)
  analytical-core:
    build:
      context: ./backend/analytical_core
    container_name: ibkt_analytical_core_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 4.5G
    expose:
      - "8000"
    environment:
      PORT: 8000
      WEB_CONCURRENCY: 7

  # 6. Основний Nginx Proxy - ЄДИНИЙ вхідний пункт системи
  nginx:
    image: nginx:alpine
    container_name: ibkt_proxy_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    sysctls:
      - net.core.somaxconn=4096
      - net.ipv4.ip_local_port_range=1024 65535
    ports:
      - "80:80"   # HTTP для редіректів та Certbot
      - "443:443" # HTTPS для безпечного з'єднання
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro # Прод конфіг
      - /etc/letsencrypt:/etc/nginx/certs:ro                 # Реальні сертифікати Let's Encrypt з хоста
      - certbot_www:/var/www/certbot:ro                      # Спільна папка з Certbot для верифікації
    depends_on:
      - frontend
      - backend

  # 7. Автоматичне оновлення сертифікатів Let's Encrypt (Certbot)
  # Перевіряє та оновлює сертифікати кожні 12 годин без зупинки сайту!
  certbot:
    image: certbot/certbot
    container_name: ibkt_certbot_prod
    restart: always
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Скрипт автоматичного оновлення
    entrypoint: "/bin/sh -c 'trap exit 0 SIGTERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data_prod:
  certbot_www: # Спільний диск для верифікації Certbot
